<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PharmaClinicalPro</title>

  <meta name="theme-color" content="#0F766E">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>💊 PharmaClinicalPro</h1>
    <p>Eczacı Klinik Bilgi Sistemi</p>
</header>

<main>

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Ürün veya etken madde ara...">
</div>

<div id="productList">

<div class="card">

<h2>Parol Tablet</h2>

<div class="green">
<h3>Endikasyon</h3>
<p>Ağrı ve ateş.</p>
</div>

<div class="red">
<h3>Kontrendikasyon</h3>
<p>Parasetamol alerjisi.</p>
</div>

<div class="blue">
<h3>Doz</h3>
<p>500-1000 mg</p>
</div>

<div class="orange">
<h3>Kullanım</h3>
<p>Tok veya aç alınabilir.</p>
</div>

<div class="purple">
<h3>Eczacı Danışmanlığı</h3>
<p>Günlük maksimum dozu aşmayınız.</p>
</div>

</div>

</div>

</main>

<script src="app.js"></script>

</body>
</html>
